Objectifs Atteints : * Déploiement réussi d'Amazon RDS (PostgreSQL) via CloudFormation (Scripting Bash + IaC). L'infrastructure 3-Tiers de base est désormais sur pied.

Conteneurisation du backend pour la production (rédaction du Dockerfile Django).

Acquisitions Techniques & Résolution de Problèmes (AWS SAA / DevOps) :

FinOps & Architecture Réseau : Justification stratégique du positionnement d'ECS dans un sous-réseau public. Utilisation de Security Groups stricts pour compenser l'absence de NAT Gateway et maintenir l'environnement dans le Free Tier (0$).

Troubleshooting IaC (CloudFormation) : * Compréhension du mécanisme d'Early Validation d'AWS (règles de nommage strictes, distinction avec la syntaxe Terraform).

Diagnostic et résolution en ligne de commande (CLI) d'une erreur de permission IAM (DescribeDBSubnetGroups) en attachant une Managed Policy (AmazonRDSFullAccess) au rôle de déploiement.

Standards de Production (Conteneurs) : Compréhension critique de l'Anti-Pattern du serveur de développement (manage.py runserver). Remplacement par un serveur WSGI multi-thread industriel (gunicorn) pour garantir la sécurité et la scalabilité.

Vision CI/CD : Rappel de la règle de préséance en automatisation : L'infrastructure (les variables d'environnement et les accès) doit être prête avant le déploiement du code applicatif.

