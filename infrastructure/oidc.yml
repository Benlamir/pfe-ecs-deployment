AWSTemplateFormatVersion: '2010-09-09'
Description: 'PFE Milestone 6 : IAM OIDC Provider pour GitHub Actions'

Parameters:
  GitHubOwner:
    Type: String
    Description: Benlamir
    Default: 'Benlamir'
  GitHubRepo:
    Type: String
    Description: pfe-ecs-deployment
    Default: 'pfe-ecs-deployment'

Resources:
  # 1. Le pont de confiance entre AWS et GitHub
  GithubOidcProvider:
    Type: AWS::IAM::OIDCProvider
    Properties:
      Url: https://token.actions.githubusercontent.com
      ClientIdList:
        - sts.amazonaws.com
      ThumbprintList:
        - 1b511abead59c6ce207077c0bf0e0043b1382612 # Empreinte cryptographique standard de GitHub

  # 2. Le Rôle que GitHub va assumer
  GitHubActionsRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: GitHubActionsDeployRole
      # La politique de confiance : Seul TON repository a le droit de prendre ce rôle
      AssumeRolePolicyDocument:
        Statement:
          - Effect: Allow
            Action: sts:AssumeRoleWithWebIdentity
            Principal:
              Federated: !Ref GithubOidcProvider
            Condition:
              StringLike:
                token.actions.githubusercontent.com:sub: !Sub repo:${GitHubOwner}/${GitHubRepo}:*
              StringEquals:
                token.actions.githubusercontent.com:aud: sts.amazonaws.com
      # Les permissions effectives du rôle (Scoped IAM Policy)
      Policies:
        - PolicyName: GitHubActionsDeployPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: AllowCloudFormationControlPlane
                Effect: Allow
                Action:
                  - cloudformation:ValidateTemplate
                  - cloudformation:CreateChangeSet
                  - cloudformation:DescribeChangeSet
                  - cloudformation:ExecuteChangeSet
                  - cloudformation:DeleteChangeSet
                  - cloudformation:CreateStack
                  - cloudformation:UpdateStack
                  - cloudformation:DeleteStack
                  - cloudformation:DescribeStacks
                  - cloudformation:DescribeStackEvents
                  - cloudformation:DescribeStackResources
                  - cloudformation:GetTemplateSummary
                  - cloudformation:ListStacks
                  - cloudformation:ListStackResources
                  - cloudformation:ListChangeSets
                Resource: "*"
              - Sid: AllowEc2ForVpcBuild
                Effect: Allow
                Action:
                  - ec2:CreateVpc
                  - ec2:DeleteVpc
                  - ec2:ModifyVpcAttribute
                  - ec2:DescribeVpcAttribute
                  - ec2:CreateSubnet
                  - ec2:DeleteSubnet
                  - ec2:ModifySubnetAttribute
                  - ec2:CreateRouteTable
                  - ec2:DeleteRouteTable
                  - ec2:AssociateRouteTable
                  - ec2:DisassociateRouteTable
                  - ec2:CreateRoute
                  - ec2:ReplaceRoute
                  - ec2:DeleteRoute
                  - ec2:DescribeRouteTables
                  - ec2:CreateInternetGateway
                  - ec2:DeleteInternetGateway
                  - ec2:AttachInternetGateway
                  - ec2:DetachInternetGateway
                  - ec2:DescribeInternetGateways
                  - ec2:CreateVpcEndpoint
                  - ec2:DeleteVpcEndpoints
                  - ec2:DescribeVpcEndpoints
                  - ec2:DescribeVpcEndpointServices
                  - ec2:DescribeAvailabilityZones
                  - ec2:DescribeSubnets
                  - ec2:DescribeVpcs
                  - ec2:CreateSecurityGroup
                  - ec2:DeleteSecurityGroup
                  - ec2:DescribeSecurityGroups
                  - ec2:DescribeNetworkInterfaces
                  - ec2:AuthorizeSecurityGroupIngress
                  - ec2:RevokeSecurityGroupIngress
                  - ec2:CreateTags
                  - ec2:DeleteTags
                Resource: "*"
              - Sid: AllowEcrForContainerRegistry
                Effect: Allow
                Action:
                  - ecr:*
                Resource: "*"
              - Sid: AllowEcsAndLogs
                Effect: Allow
                Action:
                  - ecs:*
                  - logs:CreateLogGroup
                  - logs:DeleteLogGroup
                  - logs:DescribeLogGroups
                  - logs:PutRetentionPolicy
                Resource: "*"
              - Sid: AllowIamRoleManagement
                Effect: Allow
                Action:
                  - iam:CreateRole
                  - iam:DeleteRole
                  - iam:AttachRolePolicy
                  - iam:DetachRolePolicy
                  - iam:GetRole
                  - iam:PutRolePolicy
                  - iam:DeleteRolePolicy
                  - iam:GetRolePolicy
                  - iam:TagRole
                Resource: "*"
              - Sid: AllowPassRoleToECS
                Effect: Allow
                Action: iam:PassRole
                Resource: "*"
                Condition:
                  StringEquals:
                    iam:PassedToService: ecs-tasks.amazonaws.com
              - Sid: AllowALBManagement
                Effect: Allow
                Action:
                  - elasticloadbalancing:*
                Resource: "*"
              - Sid: AllowSLRCreation
                Effect: Allow
                Action: iam:CreateServiceLinkedRole
                Resource: "*"
                Condition:
                  StringLike:
                    iam:AWSServiceName: 
                      - ecs.amazonaws.com
                      - elasticloadbalancing.amazonaws.com
              - Sid: AllowRDSManagement
                Effect: Allow
                Action:
                  - rds:*
                Resource: "*"
              - Sid: AllowS3Management
                Effect: Allow
                Action:
                  - s3:*
                Resource: "*"
              - Sid: AllowSecretsManager
                Effect: Allow
                Action:
                  - secretsmanager:*
                Resource: "*"

Outputs:
  GitHubActionsRoleArn:
    Description: L'ARN du rôle IAM à configurer dans GitHub Secrets
    Value: !GetAtt GitHubActionsRole.Arn