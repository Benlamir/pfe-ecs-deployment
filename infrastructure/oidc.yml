AWSTemplateFormatVersion: '2010-09-09'
Description: 'PFE Milestone 6 : IAM OIDC Provider pour GitHub Actions'

Parameters:
  GitHubOwner:
    Type: String
    Description: Benlamir
    Default: 'Benlamir'
  GitHubRepo:
    Type: String
    Description: pfe-ecs-deployment
    Default: 'pfe-ecs-deployment'

Resources:
  # 1. Le pont de confiance entre AWS et GitHub
  GithubOidcProvider:
    Type: AWS::IAM::OIDCProvider
    Properties:
      Url: https://token.actions.githubusercontent.com
      ClientIdList:
        - sts.amazonaws.com
      ThumbprintList:
        - 1b511abead59c6ce207077c0bf0e0043b1382612 # Empreinte cryptographique standard de GitHub

  # 2. Le Rôle que GitHub va assumer
  GitHubActionsRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: GitHubActionsDeployRole
      # La politique de confiance : Seul TON repository a le droit de prendre ce rôle
      AssumeRolePolicyDocument:
        Statement:
          - Effect: Allow
            Action: sts:AssumeRoleWithWebIdentity
            Principal:
              Federated: !Ref GithubOidcProvider
            Condition:
              StringLike:
                token.actions.githubusercontent.com:sub: !Sub repo:${GitHubOwner}/${GitHubRepo}:*
              StringEquals:
                token.actions.githubusercontent.com:aud: sts.amazonaws.com
      # Les permissions effectives du rôle
      Policies:
        - PolicyName: GitHubActionsDeployPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: AllowPushToECR
                Effect: Allow
                Action:
                  - ecr:GetAuthorizationToken
                  - ecr:BatchCheckLayerAvailability
                  - ecr:GetDownloadUrlForLayer
                  - ecr:GetRepositoryPolicy
                  - ecr:DescribeRepositories
                  - ecr:ListImages
                  - ecr:DescribeImages
                  - ecr:BatchGetImage
                  - ecr:InitiateLayerUpload
                  - ecr:UploadLayerPart
                  - ecr:CompleteLayerUpload
                  - ecr:PutImage
                Resource: "*"
              - Sid: AllowECSUpdate
                Effect: Allow
                Action:
                  - ecs:UpdateService
                  - ecs:DescribeServices
                  - ecs:RegisterTaskDefinition
                  - ecs:DescribeTaskDefinition
                  - iam:PassRole
                Resource: "*"

Outputs:
  GitHubActionsRoleArn:
    Description: L'ARN du rôle IAM à configurer dans GitHub Secrets
    Value: !GetAtt GitHubActionsRole.Arn