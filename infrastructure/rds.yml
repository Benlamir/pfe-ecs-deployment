AWSTemplateFormatVersion: '2010-09-09'
Description: Couche de donnees - Base PostgreSQL RDS (Free Tier) pour l'application CFC.

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
  SubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
  VpcCidr:
    Type: String
    Default: 10.0.0.0/16
  DBName:
    Type: String
    Default: cfcdb
  DBUser:
    Type: String
    Default: cfcadmin
  DBPassword:
    Type: String
    NoEcho: true

Resources:
  RDSSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Autoriser le trafic PostgreSQL
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 5432
          ToPort: 5432
          CidrIp: !Ref VpcCidr

  DBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: Sous-reseaux pour le cluster RDS
      SubnetIds: !Ref SubnetIds

  CfcDatabase:
    Type: AWS::RDS::DBInstance
    Properties:
      Engine: postgres
      DBInstanceClass: db.t3.micro
      AllocatedStorage: 20
      StorageType: gp2
      DBName: !Ref DBName
      MasterUsername: !Ref DBUser
      MasterUserPassword: !Ref DBPassword
      DBSubnetGroupName: !Ref DBSubnetGroup
      VPCSecurityGroups:
        - !Ref RDSSecurityGroup
      PubliclyAccessible: false
      MultiAZ: false
      DeleteAutomatedBackups: true

Outputs:
  DBEndpoint:
    Description: Adresse URL de la base de donnees
    Value: !GetAtt CfcDatabase.Endpoint.Address
    Export:
      Name: pfe-rds-endpoint
  DBPort:
    Description: Port de connexion
    Value: !GetAtt CfcDatabase.Endpoint.Port
    Export:
      Name: pfe-rds-port