name: Validate Infrastructure Templates

on:
  push:
    branches:
      - main
    paths:
      - 'infrastructure/**.yml'
      - '.github/workflows/validate-infra.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'infrastructure/**.yml'
      - '.github/workflows/validate-infra.yml'
  workflow_dispatch:

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}

permissions:
  id-token: write
  contents: read

concurrency:
  group: validate-infra-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cfn-lint:
    name: CloudFormation Linter
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install cfn-lint
        run: pip install cfn-lint
        
      - name: Run cfn-lint
        # Ignore W1011 since secrets management (M13) is planned for later
        run: cfn-lint -t infrastructure/*.yml --ignore-checks W1011

  aws-validate:
    name: AWS Native Validation
    needs: cfn-lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Validate CloudFormation Templates
        run: |
          set -e
          for template in infrastructure/*.yml; do
            echo "Validating $template..."
            aws cloudformation validate-template --template-body "file://$template"
          done

  deploy-infra:
    name: Deploy Infrastructure
    needs: [cfn-lint, aws-validate]
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    environment:
      name: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy Network Stack
        run: |
          aws cloudformation deploy \
            --template-file infrastructure/network.yml \
            --stack-name pfe-network-stack \
            --capabilities CAPABILITY_NAMED_IAM \
            --no-fail-on-empty-changeset

      - name: Deploy ECR Stack
        run: |
          aws cloudformation deploy \
            --template-file infrastructure/ecr.yml \
            --stack-name pfe-ecr-stack \
            --capabilities CAPABILITY_NAMED_IAM \
            --no-fail-on-empty-changeset

      - name: Deploy ALB Stack
        run: |
          aws cloudformation deploy \
            --template-file infrastructure/alb.yml \
            --stack-name pfe-alb-stack \
            --capabilities CAPABILITY_NAMED_IAM \
            --no-fail-on-empty-changeset
            
      - name: Deploy ECS Stack
        run: |
          aws cloudformation deploy \
            --template-file infrastructure/ecs.yml \
            --stack-name pfe-ecs-stack \
            --capabilities CAPABILITY_NAMED_IAM \
            --no-fail-on-empty-changeset

      - name: Deploy RDS Stack
        run: |
          aws cloudformation deploy \
            --template-file infrastructure/rds.yml \
            --stack-name pfe-rds-stack \
            --capabilities CAPABILITY_NAMED_IAM \
            --no-fail-on-empty-changeset

      - name: Deploy S3 Stack
        run: |
          aws cloudformation deploy \
            --template-file infrastructure/s3.yml \
            --stack-name pfe-s3-stack \
            --capabilities CAPABILITY_NAMED_IAM \
            --no-fail-on-empty-changeset
