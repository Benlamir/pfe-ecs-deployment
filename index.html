<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PFE - Container Terminal - Marcus Aurelius Edition</title>
    <style>
        :root {
            --bg-color: #1a1a2e; /* Dark Blue Industrial */
            --container-red: #d9534f;
            --text-color: #e6e6e6;
            --accent-color: #f0ad4e;
            --terminal-font: 'Courier New', Courier, monospace;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--terminal-font);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            border: 5px solid #2a2a40;
        }

        header {
            width: 100%;
            text-align: center;
            border-bottom: 2px dashed #444;
            padding-bottom: 20px;
            margin-bottom: 30px;
        }

        h1 {
            color: var(--accent-color);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 10px 0;
        }

        .terminal-status {
            font-size: 0.9rem;
            color: #888;
        }

        /* La zone de la citation Stoïcienne */
        .stoic-quote {
            background-color: #24243e;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 5px 5px 0px rgba(0,0,0,0.2);
            border-left: 5px solid var(--accent-color);
            max-width: 600px;
            margin-bottom: 40px;
            position: relative;
        }

        .stoic-quote p {
            font-size: 1.4rem;
            line-height: 1.6;
            margin: 0;
            font-style: italic;
        }

        .author {
            color: #aaa;
            margin-top: 15px;
            display: block;
            text-align: right;
        }

        /* La zone visuelle "Cats in Containers" (style Cantrill) */
        .container-yard {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 20px;
            width: 100%;
            max-width: 800px;
        }

        .shipping-container {
            background-color: var(--container-red);
            width: 300px;
            height: 180px;
            border-radius: 4px;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            /* Effet de côtes de conteneur maritime */
            background-image: linear-gradient(90deg, 
                rgba(255,255,255,0.05) 1px, 
                transparent 1px, 
                transparent 15px
            );
            background-size: 16px 100%;
            box-shadow: 0 8px 16px rgba(0,0,0,0.4);
            border: 2px solid #a94442;
        }

        /* L'image du chat à l'intérieur du conteneur */
        .cat-image {
            max-height: 140px;
            border-radius: 8px;
            border: 4px solid #fff;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }

        /* Label sur le conteneur */
        .container-label {
            position: absolute;
            top: 5px;
            right: 10px;
            background: rgba(0,0,0,0.7);
            color: #fff;
            padding: 2px 5px;
            font-size: 0.7rem;
            font-weight: bold;
        }

        footer {
            margin-top: auto;
            font-size: 0.8rem;
            color: #666;
            padding-top: 30px;
        }
    </style>
</head>
<body>
    <header>
        <h1>AWS ECS Fargate Terminal</h1>
        <div class="terminal-status">STATUS: OPERATIONAL | PORT: 80 | ENV: LOCAL_DEV</div>
    </header>

    <div class="stoic-quote">
        <p>"This is a cat running inside a Docker container."</p>
    </div>

    <div class="container-yard">
        <div class="shipping-container">
            <span class="container-label">UNIT_ID: A100</span>
            <img src="https://cataas.com/cat?width=250&height=140" alt="Cat in Container" class="cat-image">
        </div>
    </div>

    <footer>
        PFE Oussama B. | Milestone 1 (Local Container) | Version 1.1 "Stoic Cats"
    </footer>
</body>
</html>
